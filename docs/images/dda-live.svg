<svg viewBox="0 0 520 300" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'SF Mono','Fira Code',monospace">
  <title>deep-xpia live detection by injection depth</title>
  <desc>Live-measured detection (all defenses) by injection depth: depth 1 (registry injection) 0%, depth 2 72%, depth 3 85%, depth 4 88%, depth 5 100%. Detection does not fall with depth; the gap is at the depth-1 trust boundary.</desc>
  <rect width="520" height="300" fill="#0d1117" rx="10"/>
  <text x="24" y="34" fill="#e6edf3" font-size="13" font-weight="600">detection by depth — live, all defenses</text>
  <text x="24" y="52" fill="#6e7681" font-size="10">Claude Haiku, 300 cases. Detection does not fall with depth.</text>

  <!-- axes -->
  <line x1="60" y1="80" x2="60" y2="250" stroke="#21262d" stroke-width="1"/>
  <line x1="60" y1="250" x2="500" y2="250" stroke="#21262d" stroke-width="1"/>
  <text x="52" y="84" fill="#8b949e" font-size="8" text-anchor="end">100%</text>
  <text x="52" y="168" fill="#8b949e" font-size="8" text-anchor="end">50%</text>
  <text x="52" y="252" fill="#8b949e" font-size="8" text-anchor="end">0%</text>
  <line x1="60" y1="166" x2="500" y2="166" stroke="#30363d" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- bars: x slots, height = pct*1.7 (170px=100%) -->
  <!-- d1 0 -->
  <rect x="92" y="250" width="56" height="0.5" rx="3" fill="#f85149"/>
  <text x="120" y="244" fill="#f85149" font-size="10" text-anchor="middle" font-weight="600">0%</text>
  <text x="120" y="268" fill="#8b949e" font-size="9" text-anchor="middle">depth 1</text>
  <text x="120" y="282" fill="#6e7681" font-size="8" text-anchor="middle">registry</text>
  <!-- d2 72 -> h=122 top=128 -->
  <rect x="180" y="128" width="56" height="122" rx="3" fill="#3fb950" opacity="0.85"/>
  <text x="208" y="122" fill="#3fb950" font-size="10" text-anchor="middle" font-weight="600">72%</text>
  <text x="208" y="268" fill="#8b949e" font-size="9" text-anchor="middle">depth 2</text>
  <!-- d3 85 -> h=144 top=106 -->
  <rect x="268" y="106" width="56" height="144" rx="3" fill="#3fb950" opacity="0.85"/>
  <text x="296" y="100" fill="#3fb950" font-size="10" text-anchor="middle" font-weight="600">85%</text>
  <text x="296" y="268" fill="#8b949e" font-size="9" text-anchor="middle">depth 3</text>
  <!-- d4 88 -> h=150 top=100 -->
  <rect x="356" y="100" width="56" height="150" rx="3" fill="#3fb950" opacity="0.85"/>
  <text x="384" y="94" fill="#3fb950" font-size="10" text-anchor="middle" font-weight="600">88%</text>
  <text x="384" y="268" fill="#8b949e" font-size="9" text-anchor="middle">depth 4</text>
  <!-- d5 100 -> h=170 top=80 -->
  <rect x="444" y="80" width="56" height="170" rx="3" fill="#3fb950" opacity="0.85"/>
  <text x="472" y="74" fill="#3fb950" font-size="10" text-anchor="middle" font-weight="600">100%</text>
  <text x="472" y="268" fill="#8b949e" font-size="9" text-anchor="middle">depth 5</text>
</svg>
