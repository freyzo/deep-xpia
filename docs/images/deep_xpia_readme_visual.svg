<svg viewBox="0 0 860 430" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'SF Mono','Fira Code',monospace" font-size="11">
  <title>deep-xpia: live-measured multi-hop injection results</title>
  <desc>Left: a multi-hop agent chain where an injection propagates. Bottom-left: live-measured attack success rate by defense (none 0.69, intent verification 0.55, all defenses 0.12). Right: the blind spot is registry injection at the trust boundary, caught 0% of the time even with all defenses stacked. Detection does not fall with depth.</desc>

  <rect width="860" height="430" fill="#0d1117" rx="10"/>

  <text x="30" y="30" fill="#8b949e" font-size="10" letter-spacing="1.5">MULTI-HOP XPIA CHAIN</text>
  <text x="830" y="30" fill="#6e7681" font-size="9" text-anchor="end">live-measured · Claude Haiku · 300 cases</text>

  <!-- chain -->
  <g>
    <rect x="30" y="44" width="120" height="48" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="90" y="64" fill="#e6edf3" text-anchor="middle" font-size="10" font-weight="600">ORCHESTRATOR</text>
    <text x="90" y="80" fill="#3fb950" text-anchor="middle" font-size="8">root trust</text>

    <polygon points="160,60 168,70 160,80 164,70" fill="#f85149"/>
    <text x="164" y="54" fill="#f85149" font-size="8" text-anchor="middle">INJECT</text>
    <line x1="150" y1="70" x2="188" y2="70" stroke="#30363d" stroke-width="1.5" marker-end="url(#a)"/>

    <rect x="190" y="44" width="120" height="48" rx="6" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
    <text x="250" y="64" fill="#e6edf3" text-anchor="middle" font-size="10" font-weight="600">RESEARCH</text>
    <text x="250" y="80" fill="#8b949e" text-anchor="middle" font-size="8">agent</text>
    <line x1="310" y1="70" x2="348" y2="70" stroke="#e3b341" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#ay)"/>
    <text x="329" y="62" fill="#8b949e" font-size="8" text-anchor="middle">relays</text>

    <rect x="350" y="44" width="120" height="48" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
    <text x="410" y="64" fill="#e6edf3" text-anchor="middle" font-size="10" font-weight="600">REVIEW</text>
    <text x="410" y="80" fill="#8b949e" text-anchor="middle" font-size="8">agent</text>
    <line x1="470" y1="70" x2="508" y2="70" stroke="#e3b341" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#ay)"/>

    <rect x="510" y="44" width="120" height="48" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
    <text x="570" y="64" fill="#e6edf3" text-anchor="middle" font-size="10" font-weight="600">DEPLOY</text>
    <text x="570" y="80" fill="#8b949e" text-anchor="middle" font-size="8">agent</text>
    <line x1="630" y1="70" x2="668" y2="70" stroke="#e3b341" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#ay)"/>

    <rect x="670" y="44" width="120" height="48" rx="6" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
    <text x="730" y="64" fill="#e6edf3" text-anchor="middle" font-size="10" font-weight="600">NOTIFY</text>
    <text x="730" y="80" fill="#f85149" text-anchor="middle" font-size="8">exfil executed</text>
  </g>

  <text x="30" y="116" fill="#8b949e" font-size="9">Undefended, 69% of multi-hop injections reach the target. No single agent acts out of scope; the chain is the vulnerability.</text>

  <line x1="30" y1="132" x2="830" y2="132" stroke="#21262d" stroke-width="1"/>

  <!-- ASR bars -->
  <text x="30" y="158" fill="#8b949e" font-size="10" letter-spacing="1.5">ATTACK SUCCESS RATE (live, lower is better)</text>

  <g font-size="9">
    <text x="112" y="186" fill="#8b949e" text-anchor="end">none</text>
    <rect x="120" y="177" width="207" height="13" rx="2" fill="#f85149" opacity="0.8"/>
    <text x="333" y="186" fill="#f85149">0.69</text>

    <text x="112" y="208" fill="#8b949e" text-anchor="end">intent verify</text>
    <rect x="120" y="199" width="165" height="13" rx="2" fill="#e3b341" opacity="0.8"/>
    <text x="291" y="208" fill="#e3b341">0.55</text>

    <text x="112" y="230" fill="#8b949e" text-anchor="end">all defenses</text>
    <rect x="120" y="221" width="36" height="13" rx="2" fill="#3fb950" opacity="0.85"/>
    <text x="162" y="230" fill="#3fb950">0.12</text>
  </g>
  <text x="30" y="262" fill="#6e7681" font-size="9">Layering 5 defenses cuts attack success 0.69 to 0.12, but false positives rise to 0.31. No single defense exceeds 0.23 detection.</text>

  <line x1="30" y1="280" x2="830" y2="280" stroke="#21262d" stroke-width="1"/>

  <!-- finding -->
  <text x="30" y="306" fill="#8b949e" font-size="10" letter-spacing="1.5">THE BLIND SPOT</text>
  <rect x="30" y="318" width="800" height="86" rx="6" fill="#161b22" stroke="#f85149" stroke-width="1"/>
  <text x="46" y="344" fill="#f85149" font-size="13" font-weight="600">The trust boundary predicts compromise, not delegation depth.</text>
  <text x="46" y="366" fill="#e6edf3" font-size="10">Registry injection (DXPIA-008) enters at tool discovery, upstream of every defense. It is caught 0% of the time</text>
  <text x="46" y="382" fill="#e6edf3" font-size="10">even with all five defenses stacked. Detection did not fall with hop depth; the simulated depth-decay curve did</text>
  <text x="46" y="398" fill="#e6edf3" font-size="10">not replicate live. The danger is where the injection crosses the boundary, not how many hops it travels.</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#30363d"/></marker>
    <marker id="ay" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#e3b341"/></marker>
  </defs>
</svg>
