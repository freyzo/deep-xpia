<svg viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg" role="img" font-family="'SF Mono', 'Fira Code', monospace" font-size="11">
  <title>deep-xpia: Multi-Hop Injection Attack Chain and Depth-Dependent Accuracy</title>
  <desc>Left: a 4-hop agent chain showing injection propagating and worsening. Right: bar chart showing detection accuracy dropping from 0.88 at depth 2 to 0.53 at depth 5.</desc>

  <!-- Background -->
  <rect width="860" height="420" fill="#0d1117" rx="10"/>

  <!-- === LEFT PANEL: Attack chain === -->
  <text x="30" y="32" fill="#8b949e" font-size="10" letter-spacing="1.5" font-family="'SF Mono', monospace">MULTI-HOP XPIA CHAIN</text>

  <!-- Orchestrator node -->
  <rect x="30" y="50" width="120" height="52" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="90" y="72" fill="#e6edf3" text-anchor="middle" font-size="10" font-weight="600">ORCHESTRATOR</text>
  <text x="90" y="87" fill="#8b949e" text-anchor="middle" font-size="9">root trust</text>
  <circle cx="69" cy="68" r="4" fill="#3fb950"/>
  <text x="78" y="71" fill="#3fb950" font-size="8">TRUSTED</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="76" x2="188" y2="76" stroke="#30363d" stroke-width="1.5" marker-end="url(#arr)"/>
  <polygon points="160,66 168,76 160,86 164,76" fill="#f85149" opacity="0.9"/>
  <text x="162" y="60" fill="#f85149" font-size="8" text-anchor="middle">INJECT</text>

  <!-- Hop 1: Research Agent -->
  <rect x="190" y="50" width="120" height="52" rx="6" fill="#161b22" stroke="#f85149" stroke-width="1.5"/>
  <text x="250" y="70" fill="#e6edf3" text-anchor="middle" font-size="10" font-weight="600">RESEARCH</text>
  <text x="250" y="83" fill="#e6edf3" text-anchor="middle" font-size="9">AGENT</text>
  <text x="250" y="97" fill="#f85149" text-anchor="middle" font-size="8">drift: 1.0 ✗ detected</text>

  <!-- Arrow 2 -->
  <line x1="310" y1="76" x2="348" y2="76" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-red)"/>
  <text x="329" y="68" fill="#8b949e" font-size="8" text-anchor="middle">launders</text>

  <!-- Hop 2: Review Agent -->
  <rect x="350" y="50" width="120" height="52" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="410" y="70" fill="#e6edf3" text-anchor="middle" font-size="10" font-weight="600">REVIEW</text>
  <text x="410" y="83" fill="#e6edf3" text-anchor="middle" font-size="9">AGENT</text>
  <text x="410" y="97" fill="#e3b341" text-anchor="middle" font-size="8">drift: 0.0 ✓ evades</text>

  <!-- Arrow 3 -->
  <line x1="470" y1="76" x2="508" y2="76" stroke="#e3b341" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-yellow)"/>
  <text x="489" y="68" fill="#8b949e" font-size="8" text-anchor="middle">relays</text>

  <!-- Hop 3: Deploy Agent -->
  <rect x="510" y="50" width="120" height="52" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="570" y="70" fill="#e6edf3" text-anchor="middle" font-size="10" font-weight="600">DEPLOY</text>
  <text x="570" y="83" fill="#e6edf3" text-anchor="middle" font-size="9">AGENT</text>
  <text x="570" y="97" fill="#e3b341" text-anchor="middle" font-size="8">drift: 0.0 ✓ evades</text>

  <!-- Arrow 4 -->
  <line x1="630" y1="76" x2="668" y2="76" stroke="#e3b341" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-yellow)"/>

  <!-- Hop 4: Notify Agent -->
  <rect x="670" y="50" width="120" height="52" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="730" y="70" fill="#e6edf3" text-anchor="middle" font-size="10" font-weight="600">NOTIFY</text>
  <text x="730" y="83" fill="#e6edf3" text-anchor="middle" font-size="9">AGENT</text>
  <text x="730" y="97" fill="#e3b341" text-anchor="middle" font-size="8">exfil executed ⚠</text>

  <!-- Hop depth labels -->
  <text x="250" y="120" fill="#30363d" text-anchor="middle" font-size="9">hop 1</text>
  <text x="410" y="120" fill="#30363d" text-anchor="middle" font-size="9">hop 2</text>
  <text x="570" y="120" fill="#30363d" text-anchor="middle" font-size="9">hop 3</text>
  <text x="730" y="120" fill="#30363d" text-anchor="middle" font-size="9">hop 4</text>

  <!-- Callout box -->
  <rect x="30" y="135" width="810" height="34" rx="5" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="46" y="150" fill="#8b949e" font-size="9">DXPIA-006</text>
  <text x="100" y="150" fill="#e6edf3" font-size="9">Intent Laundering — intermediate agent rewrites raw injection into natural language, stripping all classifier signals.</text>
  <text x="46" y="163" fill="#8b949e" font-size="9">DXPIA-001</text>
  <text x="100" y="163" fill="#e6edf3" font-size="9">Session Smuggling — payload piggybacked inside an authorized delegation; scope tokens cannot distinguish text actions by intent.</text>

  <!-- Divider -->
  <line x1="30" y1="188" x2="830" y2="188" stroke="#21262d" stroke-width="1"/>

  <!-- === DDA Bar Chart === -->
  <text x="30" y="210" fill="#8b949e" font-size="10" letter-spacing="1.5" font-family="'SF Mono', monospace">DEPTH-DEPENDENT ACCURACY (DDA)</text>
  <text x="700" y="210" fill="#8b949e" font-size="9" text-anchor="end">all defenses combined, N=5 per case</text>

  <!-- Y axis -->
  <line x1="60" y1="225" x2="60" y2="390" stroke="#21262d" stroke-width="1"/>
  <line x1="60" y1="390" x2="440" y2="390" stroke="#21262d" stroke-width="1"/>

  <!-- Y gridlines -->
  <line x1="60" y1="225" x2="440" y2="225" stroke="#21262d" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="50" y="228" fill="#8b949e" font-size="8" text-anchor="end">1.0</text>
  <line x1="60" y1="267" x2="440" y2="267" stroke="#21262d" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="50" y="270" fill="#8b949e" font-size="8" text-anchor="end">0.75</text>
  <line x1="60" y1="308" x2="440" y2="308" stroke="#21262d" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="50" y="311" fill="#8b949e" font-size="8" text-anchor="end">0.5</text>
  <line x1="60" y1="349" x2="440" y2="349" stroke="#21262d" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="50" y="352" fill="#8b949e" font-size="8" text-anchor="end">0.25</text>

  <!-- Bars: 225=1.0, 390=0.0, range=165px -->
  <rect x="95" y="245" width="60" height="145" rx="3" fill="#3fb950" opacity="0.85"/>
  <text x="125" y="240" fill="#3fb950" text-anchor="middle" font-size="10" font-weight="600">0.879</text>
  <text x="125" y="405" fill="#8b949e" text-anchor="middle" font-size="9">depth 2</text>

  <rect x="195" y="272" width="60" height="118" rx="3" fill="#56d364" opacity="0.85"/>
  <text x="225" y="267" fill="#56d364" text-anchor="middle" font-size="10" font-weight="600">0.718</text>
  <text x="225" y="405" fill="#8b949e" text-anchor="middle" font-size="9">depth 3</text>

  <rect x="295" y="289" width="60" height="101" rx="3" fill="#e3b341" opacity="0.85"/>
  <text x="325" y="284" fill="#e3b341" text-anchor="middle" font-size="10" font-weight="600">0.615</text>
  <text x="325" y="405" fill="#8b949e" text-anchor="middle" font-size="9">depth 4</text>

  <rect x="395" y="303" width="60" height="87" rx="3" fill="#f85149" opacity="0.85"/>
  <text x="425" y="298" fill="#f85149" text-anchor="middle" font-size="10" font-weight="600">0.526</text>
  <text x="425" y="405" fill="#8b949e" text-anchor="middle" font-size="9">depth 5</text>

  <!-- Trend line -->
  <line x1="125" y1="245" x2="425" y2="303" stroke="#f85149" stroke-width="1" stroke-dasharray="4,2" opacity="0.5" marker-end="url(#arr-red)"/>

  <!-- === Defense effectiveness panel === -->
  <text x="490" y="210" fill="#8b949e" font-size="10" letter-spacing="1.5" font-family="'SF Mono', monospace">DEFENSE EFFECTIVENESS</text>
  <text x="490" y="228" fill="#8b949e" font-size="8">attack success rate (ASR) — lower is better</text>

  <rect x="560" y="233" width="246" height="14" rx="2" fill="#f85149" opacity="0.7"/>
  <text x="555" y="244" fill="#8b949e" font-size="8" text-anchor="end">none</text>
  <text x="810" y="244" fill="#f85149" font-size="8">0.983</text>

  <rect x="560" y="252" width="142" height="14" rx="2" fill="#e3b341" opacity="0.7"/>
  <text x="555" y="263" fill="#8b949e" font-size="8" text-anchor="end">intent verify</text>
  <text x="706" y="263" fill="#e3b341" font-size="8">0.567</text>

  <rect x="560" y="271" width="142" height="14" rx="2" fill="#e3b341" opacity="0.7"/>
  <text x="555" y="282" fill="#8b949e" font-size="8" text-anchor="end">taint</text>
  <text x="706" y="282" fill="#e3b341" font-size="8">0.567</text>

  <rect x="560" y="290" width="155" height="14" rx="2" fill="#e3b341" opacity="0.7"/>
  <text x="555" y="301" fill="#8b949e" font-size="8" text-anchor="end">scope tokens</text>
  <text x="719" y="301" fill="#e3b341" font-size="8">0.620</text>

  <rect x="560" y="309" width="177" height="14" rx="2" fill="#e3b341" opacity="0.7"/>
  <text x="555" y="320" fill="#8b949e" font-size="8" text-anchor="end">DLP</text>
  <text x="741" y="320" fill="#e3b341" font-size="8">0.709</text>

  <rect x="560" y="328" width="70" height="14" rx="2" fill="#3fb950" opacity="0.7"/>
  <text x="555" y="339" fill="#8b949e" font-size="8" text-anchor="end">all combined</text>
  <text x="634" y="339" fill="#3fb950" font-size="8">0.280 ★</text>

  <line x1="490" y1="350" x2="830" y2="350" stroke="#21262d" stroke-width="0.5"/>

  <!-- Key finding callout -->
  <rect x="490" y="358" width="340" height="42" rx="4" fill="#161b22" stroke="#f85149" stroke-width="1"/>
  <text x="502" y="372" fill="#f85149" font-size="9" font-weight="600">Headline finding:</text>
  <text x="502" y="385" fill="#e6edf3" font-size="9">Detection drops 35 pts (depth 2 to 5). At depth 5,</text>
  <text x="502" y="397" fill="#e6edf3" font-size="9">even all-combined defenses fail ~50% of the time.</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#30363d"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f85149"/>
    </marker>
    <marker id="arr-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e3b341"/>
    </marker>
  </defs>
</svg>
